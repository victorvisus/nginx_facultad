services:
  # Contenedor 1: Base de Datos Permanente (MariaDB)
  db:
    image: mariadb:10.11
    container_name: mariadb-facultad
    restart: always
    environment:
      MARIADB_DATABASE: facultad
      MARIADB_USER: facultad_user
      MARIADB_PASSWORD: facultad_pass
      MARIADB_ROOT_PASSWORD: root_pass
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql

  # Contenedor 2: Tu aplicación Python (FastAPI + Uvicorn)
  app:
    build: .
    container_name: fastapi-facultad
    restart: always
    ports:
      - '8000:8000'
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=facultad
      - DB_USER=facultad_user
      - DB_PASS=facultad_pass
    depends_on:
      - db

  # Contenedor 3: Servidor Web Proxy (Nginx)
  nginx:
    image: nginx:latest
    container_name: nginx-facultad
    restart: always
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro # <-- Cambiamos esto
    depends_on:
      - app

volumes:
  mariadb_data: # Garantiza que los alumnos creados no se borren nunca
