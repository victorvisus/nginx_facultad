<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facultad de Informática</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Estilos Globales -->
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="transition-colors" id="body">
    <div class="min-h-screen transition-colors">
      <header class="py-6 flex items-center justify-between" id="header">
        <div
          class="max-w-6xl mx-auto px-6 w-full flex items-center justify-between"
        >
          <h1 class="text-3xl font-bold">Facultad de Informática</h1>
          <button
            id="theme-toggle"
            class="px-4 py-2 rounded-lg font-semibold transition-colors"
            aria-label="Cambiar tema"
          >
            🌙 Claro
          </button>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-semibold mb-8">{{name}}</h2>

        <div class="overflow-x-auto rounded-lg border">
          <table class="w-full">
            <thead>
              <tr class="border-b">
                <th class="px-6 py-4 text-left font-semibold">Nombre Alumno</th>
                <th class="px-6 py-4 text-left font-semibold">
                  Fecha de Nacimiento
                </th>
                <th class="px-6 py-4 text-left font-semibold">NIF o NIE</th>
              </tr>
            </thead>
            <tbody>
              <tr class="border-b hover:transition-colors">
                <td class="px-6 py-4 transition-colors">{{nombre}}</td>
                <td class="px-6 py-4 transition-colors">
                  {{fecha_nacimiento}}
                </td>
                <td class="px-6 py-4 font-mono">{{NIF}}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Scripts Externos -->
    <script src="/js/theme.js"></script>
  </body>
</html>
