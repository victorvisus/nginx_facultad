<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultar Alumnos Becados</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-negro-carbon: #0e0e11;
        --color-gris-antracita: #1c1e22;
        --color-gris-acero: #3a3d42;
        --color-gris-tecnico: #b5b8be;
        --color-verde-criptico: #3aff7a;
        --color-blanco-tecnico: #f2f3f5;
      }

      :root[data-theme='dark'] {
        --color-negro-carbon: #0e0e11;
        --color-gris-antracita: #1c1e22;
        --color-gris-acero: #3a3d42;
        --color-gris-tecnico: #b5b8be;
        --color-verde-criptico: #3aff7a;
        --color-blanco-tecnico: #f2f3f5;
      }

      :root[data-theme='light'] {
        --color-negro-carbon: #f2f3f5;
        --color-gris-antracita: #e8e9eb;
        --color-gris-acero: #d0d1d5;
        --color-gris-tecnico: #3a3d42;
        --color-verde-criptico: #00d64f;
        --color-blanco-tecnico: #0e0e11;
      }

      * {
        transition:
          background-color 0.3s,
          color 0.3s,
          border-color 0.3s;
      }

      body {
        font-family: 'Source Sans 3', sans-serif;
        background-color: var(--color-negro-carbon);
        color: var(--color-blanco-tecnico);
      }

      h1,
      h2,
      h3,
      h4 {
        font-family: 'Inter', sans-serif;
      }

      code,
      pre {
        font-family: 'JetBrains Mono', monospace;
      }

      .form-container {
        background-color: var(--color-gris-antracita);
        border-color: var(--color-verde-criptico);
      }

      button#theme-toggle {
        background-color: var(--color-verde-criptico);
        color: var(--color-negro-carbon);
      }

      button#theme-toggle:hover {
        filter: brightness(0.9);
      }

      input,
      select {
        background-color: var(--color-negro-carbon);
        color: var(--color-blanco-tecnico);
        border-color: var(--color-gris-acero);
      }

      input:focus,
      select:focus {
        border-color: var(--color-verde-criptico);
      }

      button[type='submit'] {
        background-color: var(--color-verde-criptico);
        color: var(--color-negro-carbon);
      }

      button[type='submit']:hover {
        filter: brightness(0.9);
      }
    </style>
  </head>
  <body class="transition-colors" id="body">
    <div
      class="min-h-screen flex items-center justify-center p-4 transition-colors"
    >
      <div class="w-full max-w-md">
        <div class="rounded-lg border-2 p-8 shadow-lg form-container">
          <div class="flex items-center justify-between gap-4 mb-8">
            <div>
              <h1 class="text-3xl font-bold mb-2">Consulta de Becas</h1>
              <p class="text-sm">Busca alumnos por estado de beca</p>
            </div>
            <button
              id="theme-toggle"
              class="px-4 py-2 rounded-lg font-semibold transition-colors whitespace-nowrap"
              aria-label="Cambiar tema"
              type="button"
            >
              🌙 Claro
            </button>
          </div>

          <form action="/alumnos/resultado/" method="get" class="space-y-6">
            <div>
              <label for="becado" class="block font-semibold mb-3"
                >¿Alumno becado?</label
              >
              <select
                name="becado"
                id="becado"
                class="w-full px-4 py-3 border-2 rounded-lg focus:outline-none transition-colors hover:cursor-pointer"
              >
                <option value="1">Sí, son becados</option>
                <option value="0">No, no son becados</option>
                <option value="99">Error (test)</option>
                <option value="">Vacío (test)</option>
              </select>
            </div>

            <button
              type="submit"
              class="w-full font-bold py-3 px-4 rounded-lg transition-colors shadow-md hover:shadow-lg"
            >
              Buscar Alumnos
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      function initTheme() {
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeButton();
      }

      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeButton();
      }

      function updateThemeButton() {
        const btn = document.getElementById('theme-toggle');
        const currentTheme =
          document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
          btn.textContent = '🌙 Claro';
          btn.classList.remove('bg-gray-700', 'text-white');
          btn.classList.add('bg-[#3AFF7A]', 'text-[#0E0E11]');
        } else {
          btn.textContent = '☀️ Oscuro';
          btn.classList.remove('bg-[#3AFF7A]', 'text-[#0E0E11]');
          btn.classList.add('bg-gray-700', 'text-white');
        }
      }

      document
        .getElementById('theme-toggle')
        .addEventListener('click', toggleTheme);
      initTheme();
    </script>
  </body>
</html>
