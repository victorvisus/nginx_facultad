<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultar Alumnos Becados</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Estilos Globales -->
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/forms.css" />
  </head>
  <body class="transition-colors" id="body">
    <div
      class="min-h-screen flex items-center justify-center p-4 transition-colors"
    >
      <div class="w-full max-w-md">
        <div class="rounded-lg border-2 p-8 shadow-lg form-container">
          <div class="flex items-center justify-between gap-4 mb-8">
            <div>
              <h1 class="text-3xl font-bold mb-2">Consulta de Becas</h1>
              <p class="text-sm">Busca alumnos por estado de beca</p>
            </div>
            <button
              id="theme-toggle"
              class="px-4 py-2 rounded-lg font-semibold transition-colors whitespace-nowrap"
              aria-label="Cambiar tema"
              type="button"
            >
              🌙 Claro
            </button>
          </div>

          <form action="/alumnos/resultado/" method="get" class="space-y-6">
            <div>
              <label for="becado" class="block font-semibold mb-3"
                >¿Alumno becado?</label
              >
              <select
                name="becado"
                id="becado"
                class="w-full px-4 py-3 border-2 rounded-lg focus:outline-none transition-colors hover:cursor-pointer"
              >
                <option value="1">Sí, son becados</option>
                <option value="0">No, no son becados</option>
                <option value="99">Error (test)</option>
                <option value="">Vacío (test)</option>
              </select>
            </div>

            <button
              type="submit"
              class="w-full font-bold py-3 px-4 rounded-lg transition-colors shadow-md hover:shadow-lg"
            >
              Buscar Alumnos
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Scripts Externos -->
    <script src="/js/theme.js"></script>
  </body>
</html>
