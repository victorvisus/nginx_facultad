<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listado de Alumnos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-negro-carbon: #0e0e11;
        --color-gris-antracita: #1c1e22;
        --color-gris-acero: #3a3d42;
        --color-gris-tecnico: #b5b8be;
        --color-verde-criptico: #3aff7a;
        --color-blanco-tecnico: #f2f3f5;
      }

      :root[data-theme='dark'] {
        --color-negro-carbon: #0e0e11;
        --color-gris-antracita: #1c1e22;
        --color-gris-acero: #3a3d42;
        --color-gris-tecnico: #b5b8be;
        --color-verde-criptico: #3aff7a;
        --color-blanco-tecnico: #f2f3f5;
      }

      :root[data-theme='light'] {
        --color-negro-carbon: #f2f3f5;
        --color-gris-antracita: #e8e9eb;
        --color-gris-acero: #d0d1d5;
        --color-gris-tecnico: #3a3d42;
        --color-verde-criptico: #00d64f;
        --color-blanco-tecnico: #0e0e11;
      }

      * {
        transition:
          background-color 0.3s,
          color 0.3s,
          border-color 0.3s;
      }

      body {
        font-family: 'Source Sans 3', sans-serif;
        background-color: var(--color-negro-carbon);
        color: var(--color-blanco-tecnico);
      }

      h1,
      h2,
      h3,
      h4 {
        font-family: 'Inter', sans-serif;
      }

      h5,
      h6 {
        font-family: 'Source Sans 3', sans-serif;
      }

      code,
      pre {
        font-family: 'JetBrains Mono', monospace;
      }

      header {
        background-color: var(--color-gris-antracita);
        border-color: var(--color-verde-criptico);
      }

      button#theme-toggle {
        background-color: var(--color-verde-criptico);
        color: var(--color-negro-carbon);
      }

      button#theme-toggle:hover {
        filter: brightness(0.9);
      }

      table {
        border-color: var(--color-gris-acero);
      }

      th {
        background-color: var(--color-gris-antracita);
        color: var(--color-verde-criptico);
        border-color: var(--color-verde-criptico);
      }

      td {
        color: var(--color-blanco-tecnico);
        border-color: var(--color-gris-acero);
      }

      tr:hover {
        background-color: var(--color-gris-antracita);
      }
    </style>
  </head>
  <body class="transition-colors" id="body">
    <div class="min-h-screen transition-colors">
      <header
        class="py-6 flex items-center justify-between transition-colors"
        id="header"
      >
        <div
          class="max-w-6xl mx-auto px-6 w-full flex items-center justify-between"
        >
          <h1 class="text-3xl font-bold">Facultad de Informática</h1>
          <button
            id="theme-toggle"
            class="px-4 py-2 rounded-lg font-semibold transition-colors"
            aria-label="Cambiar tema"
          >
            🌙 Claro
          </button>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-semibold mb-8">{{name}}</h2>

        <div class="overflow-x-auto rounded-lg border">
          <table class="w-full">
            <thead>
              <tr class="border-b">
                <th class="px-6 py-4 text-left font-semibold">Nombre Alumno</th>
                <th class="px-6 py-4 text-left font-semibold">
                  Fecha de Nacimiento
                </th>
                <th class="px-6 py-4 text-left font-semibold">NIF o NIE</th>
              </tr>
            </thead>
            <tbody>
              {% for alumno in alumnos %}
              <tr class="border-b hover:transition-colors">
                <td class="px-6 py-4">{{alumno.nombre}}</td>
                <td class="px-6 py-4">{{alumno.fechaNacimiento}}</td>
                <td class="px-6 py-4 font-mono">{{alumno.NIF}}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <script>
      function initTheme() {
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeButton();
      }

      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeButton();
      }

      function updateThemeButton() {
        const btn = document.getElementById('theme-toggle');
        const currentTheme =
          document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
          btn.textContent = '🌙 Claro';
          btn.classList.remove('bg-gray-700', 'text-white');
          btn.classList.add('bg-[#3AFF7A]', 'text-[#0E0E11]');
        } else {
          btn.textContent = '☀️ Oscuro';
          btn.classList.remove('bg-[#3AFF7A]', 'text-[#0E0E11]');
          btn.classList.add('bg-gray-700', 'text-white');
        }
      }

      document
        .getElementById('theme-toggle')
        .addEventListener('click', toggleTheme);
      initTheme();

      console.log(
        'JSON de alumnos recibido en la plantilla:',
        '{{ alumnos | tojson | safe }}',
      );
      const alumnosData = JSON.parse(`{{ alumnos | tojson | safe }}`);
      console.log('Datos de alumnos cargados:', alumnosData);
    </script>
  </body>
</html>
